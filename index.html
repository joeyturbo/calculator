<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css">
  <title>Calculator</title>
</head>
<body>
  <div class="container">
    <div id="display">0</div>
    <div id="calc-button-container">
      <div id="calc-number-buttons">
        <div id="num-row-1" class="num-row">
          <div class='num-btn btn' id="one">1</div>
          <div class='num-btn btn' id="two">2</div>
          <div class='num-btn btn' id="three">3</div>
        </div>
        <div id="num-row-2" class="num-row">
          <div class='num-btn btn' id="four">4</div>
          <div class='num-btn btn' id="five">5</div>
          <div class='num-btn btn' id="six">6</div>
        </div>
        <div id="num-row-3" class="num-row">
          <div class='num-btn btn' id="seven">7</div>
          <div class='num-btn btn' id="eight">8</div>
          <div class='num-btn btn' id="nine">9</div>
        </div>
        <div id="num-row-4" class="num-row">
          <div class='num-btn btn' id="zero">0</div>
        </div>
      </div>
      <div id="calc-symbol-buttons">
        <div class="sym-btn btn"id="add">+</div>
        <div class="sym-btn btn"id="subtract">-</div>
        <div class="sym-btn btn"id="multiply">*</div>
        <div class="sym-btn btn"id="divide">/</div>
        <div class="sym-btn btn"id="equals">=</div>
        <div class="sym-btn btn"id="clear">C</div>
      </div>
    </div>
  </div>
</body>
</html>
